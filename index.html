<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pengumuman Hasil TKA</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f7fb;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

.header{
    background:#003366;
    color:white;
    text-align:center;
    padding:20px;
    border-radius:10px;
}

.search-box{
    background:white;
    padding:20px;
    margin-top:20px;
    border-radius:10px;
    text-align:center;
}

input{
    width:300px;
    max-width:90%;
    padding:12px;
    font-size:16px;
}

button{
    padding:12px 20px;
    background:#003366;
    color:white;
    border:none;
    cursor:pointer;
}

.card{
    display:none;
    background:white;
    margin-top:20px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.profile{
    display:flex;
    flex-wrap:wrap;
    gap:20px;
}

.profile img{
    width:180px;
    height:240px;
    object-fit:cover;
    border:3px solid #003366;
}

.info{
    flex:1;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}

th,td{
    border:1px solid #ccc;
    padding:10px;
    text-align:center;
}

th{
    background:#003366;
    color:white;
}

.nilai{
    font-weight:bold;
}

.error{
    color:red;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>PENGUMUMAN HASIL TKA</h1>
<h2>SMP NEGERI SEKUTING TERPADU</h2>
</div>

<div class="search-box">
<input type="text" id="nisn" placeholder="Masukkan NISN">
<button onclick="cari()">Lihat Hasil</button>

<div id="error" class="error"></div>
</div>

<div id="hasil" class="card"></div>

</div>

<script>

let dataSiswa=[];

fetch("data.json")
.then(res=>res.json())
.then(data=>{
    dataSiswa=data;
});

function cari(){

const nisn=document.getElementById("nisn").value.trim();

const siswa=dataSiswa.find(
s=>s.nisn===nisn
);

if(!siswa){

document.getElementById("hasil").style.display="none";

document.getElementById("error").innerHTML=
"NISN tidak ditemukan";

return;
}

document.getElementById("error").innerHTML="";

document.getElementById("hasil").style.display="block";

document.getElementById("hasil").innerHTML=`

<div class="profile">

<div>
<img src="${siswa.foto}"
onerror="this.src='https://via.placeholder.com/180x240?text=Foto+Tidak+Ada'">
</div>

<div class="info">

<h2>${siswa.nama}</h2>

<p><b>NISN :</b> ${siswa.nisn}</p>

<p><b>Nomor Peserta :</b> ${siswa.nomor_peserta}</p>

<p><b>TTL :</b> ${siswa.ttl}</p>

<table>

<tr>
<th>Mata Pelajaran</th>
<th>Nilai</th>
</tr>

<tr>
<td>Matematika</td>
<td class="nilai">${siswa.matematika}</td>
</tr>

<tr>
<td>Bahasa Indonesia</td>
<td class="nilai">${siswa.bahasa}</td>
</tr>

</table>

</div>

</div>
`;
}

</script>

</body>
</html>
