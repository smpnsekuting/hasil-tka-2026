<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem TKA 2026 PRO MAX</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{
  min-height:100vh;
  background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
  padding:20px;
}
.container{max-width:1000px;margin:auto;}
.card{
  background:white;
  border-radius:20px;
  padding:25px;
  box-shadow:0 15px 40px rgba(0,0,0,.2);
}

h1{text-align:center;color:#1e3a8a;}
.sub{text-align:center;color:#666;margin-bottom:20px;}

input,button{
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  font-size:14px;
}

button{
  background:#2563eb;
  color:white;
  cursor:pointer;
  border:none;
}

button:hover{background:#1d4ed8;}

.row{display:flex;gap:10px;flex-wrap:wrap;}

#hasil{margin-top:20px;}

.siswa{background:#fff;padding:20px;border-radius:15px;animation:show .3s ease;}
@keyframes show{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

.foto{width:160px;height:210px;object-fit:cover;border-radius:10px;border:3px solid #2563eb;}

.nilai{display:flex;gap:10px;margin-top:15px;}
.box{flex:1;padding:15px;border-radius:12px;color:white;text-align:center;}
.mtk{background:#2563eb;}
.bindo{background:#16a34a;}

.upload-box{
  border:2px dashed #2563eb;
  padding:15px;
  border-radius:15px;
  text-align:center;
  margin-top:20px;
  color:#2563eb;
  cursor:pointer;
}
.upload-box.dragover{background:#e0f2fe;}

small{color:#666;}
</style>
</head>
<body>

<div class="container">
<div class="card">

<h1>SISTEM TKA 2026 PRO MAX</h1>
<p class="sub">SMP NEGERI SEKUTING TERPADU</p>

<div class="row">
<input id="nisn" placeholder="Cari NISN">
<button onclick="cari()">Cari</button>
</div>

<div class="upload-box" id="dropzone">
📤 Drag & Drop Foto Siswa di sini / Klik
<input type="file" id="fileInput" hidden accept="image/*">
<br><small>Foto akan langsung muncul (tanpa server)</small>
</div>

<div id="hasil"></div>

</div>
</div>

<script>

let database=[];
let tempFoto = "";

fetch('data.json')
.then(r=>r.json())
.then(d=>database=d);

// Drag & Drop Upload
const dropzone=document.getElementById('dropzone');
const fileInput=document.getElementById('fileInput');

dropzone.addEventListener('click',()=>fileInput.click());

dropzone.addEventListener('dragover',e=>{
  e.preventDefault();
  dropzone.classList.add('dragover');
});

dropzone.addEventListener('dragleave',()=>{
  dropzone.classList.remove('dragover');
});

dropzone.addEventListener('drop',e=>{
  e.preventDefault();
  dropzone.classList.remove('dragover');
  handleFile(e.dataTransfer.files[0]);
});

fileInput.addEventListener('change',e=>{
  handleFile(e.target.files[0]);
});

function handleFile(file){
  const reader=new FileReader();
  reader.onload=function(e){
    tempFoto=e.target.result;
    alert("Foto berhasil di-load (preview sementara)");
  }
  reader.readAsDataURL(file);
}

function cari(){

  let nisn=document.getElementById('nisn').value.trim();
  let siswa=database.find(s=>s.nisn==nisn);

  let html=document.getElementById('hasil');

  if(!siswa){
    html.innerHTML="<p style='color:white'>Data tidak ditemukan</p>";
    return;
  }

  html.innerHTML=`
  <div class='siswa'>
    <center>
      <img class='foto' src='${tempFoto || siswa.foto}'>
    </center>

    <h3>${siswa.nama}</h3>
    <p>NISN: ${siswa.nisn}</p>
    <p>No Peserta: ${siswa.nomor_peserta}</p>
    <p>TTL: ${siswa.ttl}</p>

    <div class='nilai'>
      <div class='box mtk'>
        <h3>MTK</h3>
        ${siswa.matematika}
      </div>
      <div class='box bindo'>
        <h3>B.INDO</h3>
        ${siswa.bahasa}
      </div>
    </div>
  </div>
  `;
}

</script>

</body>
</html>
