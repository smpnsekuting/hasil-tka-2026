<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasil Nilai TKA SMPN Sekuting Terpadu</title>

<style>
body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:800px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.1);
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    font-size:16px;
    margin-bottom:10px;
}

button{
    width:100%;
    padding:12px;
    background:#0066cc;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0052a3;
}

#hasil{
    margin-top:20px;
}

.foto{
    width:150px;
    height:200px;
    object-fit:cover;
    border-radius:10px;
    border:2px solid #ddd;
}

.nilai-container{
    display:flex;
    gap:20px;
    margin-top:15px;
}

.nilai-box{
    flex:1;
    background:#f8f9fa;
    padding:15px;
    border-radius:8px;
    text-align:center;
}

.nilai-angka{
    font-size:32px;
    font-weight:bold;
    color:#0066cc;
}

.nilai-predikat{
    margin-top:5px;
    font-size:16px;
}
</style>
</head>
<body>

<div class="container">

<h1>CEK NILAI TKA</h1>

<input type="text" id="nisn" placeholder="Masukkan NISN">

<button onclick="cariData()">Cek Nilai</button>

<div id="hasil"></div>

</div>

<script>

let database = [];

fetch('data.json')
.then(res => res.json())
.then(data => {
    database = data;
});

function formatNilai(nilaiData){

    if(!nilaiData) return "-";

    const bagian = nilaiData.split("<br>");

    return `
        <div class="nilai-angka">${bagian[0]}</div>
        <div class="nilai-predikat">${bagian[1] || ''}</div>
    `;
}

function cariData(){

    const nisn = document.getElementById("nisn").value.trim();

    const siswa = database.find(
        s => s.nisn === nisn
    );

    if(!siswa){

        document.getElementById("hasil").innerHTML=
        "<h3 style='color:red'>Data tidak ditemukan</h3>";

        return;
    }

    document.getElementById("hasil").innerHTML=`

        <center>
            <img class="foto" src="${siswa.foto}" 
                 onerror="this.src='assets/no-photo.png'">
        </center>

        <h2>${siswa.nama}</h2>

        <p><b>NISN :</b> ${siswa.nisn}</p>

        <p><b>Nomor Peserta :</b> ${siswa.nomor_peserta}</p>

        <p><b>Tempat, Tanggal Lahir :</b> ${siswa.ttl}</p>

        <div class="nilai-container">

            <div class="nilai-box">
                <h3>Matematika</h3>
                ${formatNilai(siswa.matematika)}
            </div>

            <div class="nilai-box">
                <h3>Bahasa Indonesia</h3>
                ${formatNilai(siswa.bahasa)}
            </div>

        </div>

    `;
}

</script>

</body>
</html>
